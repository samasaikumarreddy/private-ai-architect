name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke test
        run: |
          private-ai --version
          private-ai init --dry-run --mode local-developer --project-name ci-smoke --company-name ci --output-dir generated/dry-run --force
          private-ai validate generated/dry-run
          private-ai ingest examples/sample-company-docs --collection docs --output-dir generated/index --force
          private-ai chat "AI usage rules" --index generated/index/index.json
          private-ai doctor
