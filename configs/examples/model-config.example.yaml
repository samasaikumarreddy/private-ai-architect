# Example model policy. Validate against actual hardware before apply.
runtime:
  provider: ollama
  base_url: http://model-runtime:11434
  model: select-model-before-apply

embeddings:
  provider: sentence-transformers
  model: bge-small-en

hardware:
  require_gpu: false
  minimum_ram_gb: 16
  minimum_disk_gb: 20

controls:
  expose_runtime_publicly: false
  require_backend_proxy: true
  require_citations: true

